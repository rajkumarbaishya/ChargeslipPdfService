server:
  port: 8090

spring:
  application:
    name: Baas_chargeslip-pdf-service
  profiles:
    active: local

logging:
  level:
    root: INFO
    com.pinelabs.chargeslip: DEBUG

http:
  client:
    connect-timeout: 3000
    read-timeout: 8000

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

aws:
  s3:
    bucket-name: ${S3_BUCKET_NAME:chargeslip-pdfs}
    region: ${AWS_REGION:ap-south-1}
    presigned-url-expiry-minutes: ${S3_URL_EXPIRY_MINUTES:1440}

tiny-url:
  base-url: ${TINY_URL_SERVICE_BASE_URL:http://localhost:8092}
