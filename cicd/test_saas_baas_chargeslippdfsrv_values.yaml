  #   requiredDuringSchedulingIgnoredDuringExecution:
  #     nodeSelectorTerms:
  #       - matchExpressions:
  #           - key: eks.amazonaws.com/nodegroup
  #             operator: In
  #             values:
  #               - BAAS-NODEGROUP-TEST
