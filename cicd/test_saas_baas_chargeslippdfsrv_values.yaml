
release:
  namespace: baas-test
replicaCount: 1

image:
  repository: 274744451906.dkr.ecr.ap-south-1.amazonaws.com/bass-test
  pullPolicy: IfNotPresent
  tag: "chargeslippdfserv"
  port: 8090

imagePullSecrets: []
nameOverride: ""
fullnameOverride: "baas-test-chargeslippdfserv"

service:
  enabled: true
  type: ClusterIP
  port: 8090

resources:
   limits:
     cpu: 1000m
     memory: 1000Mi
   requests:
     cpu: 200m
     memory: 500Mi
  
profile:
 - name: "ACTIVE_PROFILE"
   value: "saas-test"
 - name: "spring.profiles.active"
   value: "saas-test"


autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
         
terminationGracePeriodSeconds: 60

# readinessProbe: 
#   failureThreshold: 3 
#   httpGet:
#     path: "/metrics/health" 
#     port: 9083
#     scheme: HTTP 
#   initialDelaySeconds: 120
#   periodSeconds: 10 
#   successThreshold: 1
#   timeoutSeconds: 5
     
serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

nodeSelector: {}

tolerations:
   - key: "dedicated"
     operator: "Equal"
     value: "BaaS"
     effect: "NoSchedule"
affinity: {}
